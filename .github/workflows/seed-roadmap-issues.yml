name: Seed Roadmap Issues

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  seed:
    name: Create starter issues
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[seed issues]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Create missing roadmap issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/seed-roadmap-issues.js
