name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Syntax and project checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run JavaScript syntax checks
        run: npm run check

  community-files:
    name: Community file contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify launch-ready docs and templates
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "docs/COMPATIBILITY.md"
            "docs/COMMUNITY_BACKLOG.md"
            "docs/LAUNCH_POSTS.md"
            "docs/ROADMAP.md"
            "docs/LAUNCH_KO.md"
            "docs/releases/v0.1.0-alpha.0.md"
            "CHANGELOG.md"
            "robots.txt"
            "sitemap.xml"
            ".github/roadmap-issues.json"
            ".github/ISSUE_TEMPLATE/bug_report.yml"
            ".github/ISSUE_TEMPLATE/compatibility_report.yml"
            ".github/ISSUE_TEMPLATE/feature_request.yml"
            ".github/PULL_REQUEST_TEMPLATE.md"
            ".github/workflows/release.yml"
            ".github/workflows/seed-roadmap-issues.yml"
          )

          for file in "${required_files[@]}"; do
            test -s "$file"
          done
